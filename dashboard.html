<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이스페이 정산 통합 가공 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --info: #36b9cc; --warning: #f6c23e; --danger: #e74a3b; --dark: #5a5c69; --light: #f8f9fc; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .upload-area { background: white; border: 2px dashed #ccc; border-radius: 10px; padding: 60px 40px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 30px; }
        .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background-color: #f1f4ff; transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; color: #888; }
        .stat-card .value { font-size: 1.6rem; font-weight: bold; margin: 10px 0 0; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .chart-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        #fileInput { display: none; }
        .btn-main { background: var(--success); color: white; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-main:hover { background: #158f76; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 정산 자동 가공 시스템</h1>
        <a href="index.html" style="text-decoration: none; color: var(--primary);">← 홈으로</a>
    </header>

    <div class="upload-area" id="dropZone">
        <h2>파일을 드래그하거나 클릭하여 업로드하세요</h2>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
    </div>

    <div id="dashboardContent" class="hidden">
        <div style="margin-bottom: 25px; display: flex; justify-content: flex-end;">
            <button onclick="exportToProcessedFormat()" id="downloadBtn" class="btn-main">
                📥 가공 양식 자동 변환 및 다운로드 (.xlsx)
            </button>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="charts-grid">
            <div class="chart-container"><canvas id="dailyTrendChart"></canvas></div>
            <div class="chart-container"><canvas id="topProductsChart"></canvas></div>
            <div class="chart-container"><canvas id="paymentMethodChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    let charts = {};

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                processData(jsonData);
            } catch (err) { alert('파일 오류: ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    function parseMoney(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        return parseInt(val.toString().replace(/[^0-9-]/g, '')) || 0;
    }

    function getVal(row, possibleNames) {
        for (let name of possibleNames) {
            if (row[name] !== undefined) return row[name];
            const cleanTarget = name.replace(/\s+/g, '');
            for (let key in row) {
                if (key.toString().replace(/\s+/g, '').includes(cleanTarget)) return row[key];
            }
        }
        return '';
    }

    // 마스터 매핑 및 대분류 설정
    const MASTER_MAPPING = [
        { keyword: '밀리터리', result: '밀리터리', group: '기타' },
        { keyword: '시즌권', result: '스키시즌권', group: '스노우파크' },
        { keyword: '원데이락커', result: '장비보관소', group: '스노우파크' },
        { keyword: '리프트', result: '리프트', group: '스노우파크' },
        { keyword: '강습', result: '강습pkg', group: '스노우파크' },
        { keyword: '30주년', result: '30pkg', group: '스노우파크' },
        { keyword: '눈썰매', result: '눈썰매', group: '스노우파크' },
        { keyword: '곤돌라', result: '관광곤돌라', group: '기타' },
        { keyword: '베이직', result: '베이직', group: '기타' },
        { keyword: '룸온리', result: '룸온리', group: '리조트' },
        { keyword: '설렘', result: '설렘', group: '리조트' },
        { keyword: '힐링', result: '힐링', group: '리조트' },
        { keyword: '스키렌탈', result: '장비렌탈', group: '스노우파크' },
        { keyword: '사우나이용권', result: '사우나', group: '워터플래닛' },
        { keyword: '스마트예약 종일권', result: '워터플래닛입장권', group: '워터플래닛' },
        { keyword: '카바나', result: '카바나', group: '워터플래닛' },
        { keyword: '썬베드', result: '선베드', group: '워터플래닛' },
        { keyword: 'wp시즌패스', result: '워터파크시즌패스', group: '워터플래닛' },
        { keyword: '아레나', result: '아레나', group: '기타' },
        { keyword: '미분류', result: '미분류', group: '기타' }
    ];

    async function exportToProcessedFormat() {
        if (!window.lastData) return alert('데이터가 없습니다.');
        const workbook = new ExcelJS.Workbook();
        
        // 1. 매핑데이터 시트
        const mapSheet = workbook.addWorksheet('매핑데이터');
        mapSheet.getCell('B2').value = '⚙️ 상품 매핑 규칙 관리';
        MASTER_MAPPING.forEach((m, i) => {
            mapSheet.getCell(`C${11+i}`).value = m.keyword;
            mapSheet.getCell(`D${11+i}`).value = m.result;
        });

        const rawFiltered = window.lastData.filter(row => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(row, ['MID']).toString()));
        const grouped = {};
        rawFiltered.forEach(row => {
            const d = getVal(row, ['정산일', '거래일자']) || '기타';
            const m = d.toString().match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/);
            const day = m ? `${m[2]}월${m[3]}일` : '기타';
            if (!grouped[day]) grouped[day] = [];
            grouped[day].push(row);
        });

        for (const [date, rows] of Object.entries(grouped).sort()) {
            const sheet = workbook.addWorksheet(date, { views: [{ zoomScale: 90 }], pageSetup: { orientation: 'landscape', paperSize: 9, fitToPage: true, fitToWidth: 1 } });
            
            // 고정 열 너비
            sheet.columns = [{width:6},{width:15},{width:12},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:13},{width:11},{width:10,hidden:true},{width:10,hidden:true},{width:11},{width:12,hidden:true},{width:16},{width:12,hidden:true},{width:15,hidden:true},{width:11},{width:32},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:16},{width:13},{width:13}];

            const mmdd = date.replace('월', '.').replace('일', '');
            sheet.getCell('A1').value = `■ 정산일 기준_${mmdd}`;
            sheet.getCell('A1').font = { size: 11, bold: true };

            const headerRow = sheet.getRow(3);
            headerRow.values = ['NO.', '결제 서비스명', '정산일', '승인일', '매입요청일', '취소일', '상 호', 'MID', '거래금액', '결제수수료', '에스크로수수료', '인증수수료', 'VAT', '정산금액', '카드/은행', '승인번호', '주문번호', '구매자', '상품명', '거래구분', 'TID', '상태', '원거래 TID', '변환결과(X)', '정산금액(Y)', '수수료+VAT(Z)'];
            headerRow.eachCell(c => {
                c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9E1F2' } };
                c.font = { bold: true, size: 9 };
                c.alignment = { vertical: 'middle', horizontal: 'center' };
                c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
            });

            // 데이터 행 실적 계산 (숨기기 판별용)
            const catStats = {};
            rows.forEach((r, i) => {
                const rIdx = i + 4;
                const row = sheet.getRow(rIdx);
                const prod = getVal(r, ['상품명']);
                const amount = parseMoney(getVal(r, ['거래금액']));
                const settlement = parseMoney(getVal(r, ['정산금액']));
                const fee = parseMoney(getVal(r, ['결제수수료'])) + parseMoney(getVal(r, ['VAT']));

                // 실적 판별
                let res = '미분류';
                for(let m of MASTER_MAPPING) { if(prod.includes(m.keyword)) res = m.result; }
                catStats[res] = (catStats[res] || 0) + 1;

                row.getCell(1).value = i + 1;
                row.getCell(9).value = amount;
                row.getCell(19).value = prod;
                row.getCell(24).value = { formula: `IFERROR(LOOKUP(1, 0/(SEARCH('매핑데이터'!$C$11:$C$1000, S${rIdx})*('매핑데이터'!$C$11:$C$1000<>"")), '매핑데이터'!$D$11:$D$1000), "미분류")` };
                row.getCell(25).value = { formula: `N${rIdx}` };
                row.getCell(26).value = { formula: `J${rIdx}+M${rIdx}` };

                // 본문 0원 데이터 숨기기
                if (amount === 0) row.hidden = true;

                row.eachCell({ includeEmpty: false }, (cell, col) => {
                    if (col > 26) return;
                    cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.font = { size: 9, name: '맑은 고딕' };
                    if ([9, 10, 13, 25, 26].includes(col)) { cell.alignment = { horizontal: 'right' }; cell.numFmt = '#,##0'; }
                    if (amount < 0 && col !== 24) cell.font.color = { argb: 'FFFF0000' };
                });
            });

            // 합계
            const endD = rows.length + 3;
            const tIdx = endD + 2;
            sheet.mergeCells(tIdx, 1, tIdx, 3);
            sheet.getCell(`A${tIdx}`).value = '합계';
            [9, 10, 13, 25, 26].forEach(c => {
                const L = {9:'I', 10:'J', 13:'M', 25:'Y', 26:'Z'}[c];
                const cell = sheet.getCell(`${L}${tIdx}`);
                cell.value = { formula: `SUM(${L}4:${L}${endD})` };
                cell.numFmt = '#,##0';
                cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: c===25 ? 'FFFFF2CC' : (c===26 ? 'FFFCE4D6' : 'FFF2F2F2') } };
            });

            // --- [대시보드 요약표: 실적 0 숨기기 + 대분류] ---
            const dbStart = tIdx + 2;
            const groups = ['리조트', '스노우파크', '워터플래닛', '기타'];
            const merges = [[2,3], [4,5], [6,9], [10,13], [14,17], [18,21], [22,25]];
            const labels = ['구분', '건수', '거래금액', '결제수수료', 'VAT', '정산금액', '수수료+VAT'];
            
            merges.forEach((m, i) => {
                sheet.mergeCells(dbStart, m[0], dbStart, m[1]);
                const cell = sheet.getCell(dbStart, m[0]);
                cell.value = labels[i];
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4E73DF' } };
                cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                cell.alignment = { horizontal: 'center' };
                cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
            });

            let currentDbRow = dbStart + 1;
            groups.forEach(groupName => {
                const groupItems = MASTER_MAPPING.filter(m => m.group === groupName);
                groupItems.forEach((item, idx) => {
                    // 실적 체크: 건수가 0이면 숨김
                    if (!catStats[item.result] || catStats[item.result] === 0) return;

                    sheet.mergeCells(currentDbRow, 2, currentDbRow, 2); // 대분류 (B)
                    sheet.mergeCells(currentDbRow, 3, currentDbRow, 3); // 소분류 (C)
                    sheet.getCell(currentDbRow, 2).value = idx === 0 ? groupName : ''; 
                    sheet.getCell(currentDbRow, 3).value = item.result;

                    // 나머지 열 병합 및 수식
                    const xAbs = `$X$4:$X$${endD}`;
                    [ [4,5], [6,9], [10,13], [14,17], [18,21], [22,25] ].forEach((m, j) => {
                        sheet.mergeCells(currentDbRow, m[0], currentDbRow, m[1]);
                        const cell = sheet.getCell(currentDbRow, m[0]);
                        if (j === 0) cell.value = { formula: `COUNTIF(${xAbs}, C${currentDbRow})` };
                        else {
                            const L = ['I', 'J', 'M', 'Y', 'Z'][j-1];
                            cell.value = { formula: `SUMIF(${xAbs}, C${currentDbRow}, $${L}$4:$${L}$${endD})` };
                        }
                        cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                        cell.numFmt = '#,##0'; cell.alignment = { horizontal: j===0 ? 'center' : 'right' };
                    });
                    currentDbRow++;
                });
            });

            sheet.autoFilter = 'A3:Z3';
            [4, 5, 6, 7, 8, 11, 12, 14, 16, 17, 20, 21, 22, 23].forEach(c => sheet.getColumn(c).hidden = true);
        }

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `나이스페이_최종가공_${new Date().toISOString().slice(0,10)}.xlsx`;
        link.click();
    }

    function processData(data) {
        const filtered = data.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
        window.lastData = data;
        let totalGross = 0, totalNet = 0, totalFee = 0;
        const daily = {}, prod = {}, meth = {};
        filtered.forEach(r => {
            const amt = parseMoney(getVal(r, ['거래금액'])), set = parseMoney(getVal(r, ['정산금액'])), f = parseMoney(getVal(r, ['결제수수료'])), p = getVal(r, ['상품명']);
            totalGross += amt; totalNet += set; totalFee += f;
            if (!daily['정산']) daily['정산'] = { gross: 0, net: 0 };
            daily['정산'].gross += amt; daily['정산'].net += set;
            prod[p] = (prod[p] || 0) + amt;
        });
        document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><h3>총 거래 금액</h3><div class="value">${totalGross.toLocaleString()}원</div></div><div class="stat-card" style="border-left-color: var(--success)"><h3>순 정산 예정액</h3><div class="value">${totalNet.toLocaleString()}원</div></div><div class="stat-card" style="border-left-color: var(--info)"><h3>총 결제 건수</h3><div class="value">${filtered.length.toLocaleString()}건</div></div><div class="stat-card" style="border-left-color: var(--warning)"><h3>총 수수료</h3><div class="value">${totalFee.toLocaleString()}원</div></div>`;
        document.getElementById('dashboardContent').classList.remove('hidden');
    }
</script>
</body>
</html>
