<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이스페이 정산 통합 가공 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --info: #36b9cc; --warning: #f6c23e; --danger: #e74a3b; --dark: #5a5c69; --light: #f8f9fc; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .upload-area { background: white; border: 2px dashed #ccc; border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background-color: #f1f4ff; transform: translateY(-2px); }
        .upload-area h3 { margin-top: 10px; color: #2c3e50; }
        .upload-area p { color: #7f8c8d; font-size: 0.9rem; }
        
        .mapping-status { background: #eef2f7; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--info); }
        .mapping-status span { font-weight: bold; color: var(--primary); }
        .btn-small { background: white; border: 1px solid #ccc; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .btn-small:hover { background: #f8f9fc; border-color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); transition: transform 0.2s; }
        .stat-card h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; color: #7f8c8d; letter-spacing: 0.5px; font-weight: 600; }
        .stat-card .value { font-size: 1.8rem; font-weight: 800; margin: 12px 0 5px; color: #2c3e50; }
        .stat-card .sub-text { font-size: 0.85rem; color: #95a5a6; }
        
        .summary-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .summary-table th { background: #f8f9fc; padding: 12px; text-align: left; font-size: 0.85rem; color: #4e73df; border-bottom: 2px solid #e3e6f0; }
        .summary-table td { padding: 12px; border-bottom: 1px solid #e3e6f0; font-size: 0.9rem; }
        .summary-table .num { text-align: right; font-variant-numeric: tabular-nums; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 30px; }
        @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
        .chart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 400px; }
        .chart-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; }
        .chart-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: var(--primary); margin-right: 10px; border-radius: 2px; }
        
        .hidden { display: none; }
        #fileInput, #mappingInput { display: none; }
        .btn-main { background: linear-gradient(135deg, #1cc88a 0%, #13855c 100%); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: all 0.3s; box-shadow: 0 4px 10px rgba(28, 200, 138, 0.3); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(28, 200, 138, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 2rem; color: #2c3e50;">📊 정산 자동 가공 시스템</h1>
            <p style="margin:5px 0 0; color: #7f8c8d;">매핑 마스터 관리 및 대시보드 자동화</p>
        </div>
        <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: 600; padding: 8px 16px; border: 1px solid var(--primary); border-radius: 20px; border: 1px solid #ccc;">← 홈으로</a>
    </header>

    <div class="upload-section">
        <!-- 매핑 마스터 업로드 (선택) -->
        <div class="upload-area" id="mappingDropZone">
            <div style="font-size: 2.5rem;">⚙️</div>
            <h3>매핑 마스터 파일 업로드</h3>
            <p>키워드-분류 규칙이 담긴 엑셀 (.xlsx)</p>
            <input type="file" id="mappingInput" accept=".xlsx, .xls">
        </div>
        <!-- 정산 로우데이터 업로드 (필수) -->
        <div class="upload-area" id="dropZone" style="border-style: solid; border-width: 2px;">
            <div style="font-size: 2.5rem;">📥</div>
            <h3>정산 로우데이터 업로드</h3>
            <p>나이스페이 정산 엑셀 파일</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <div class="mapping-status">
        <div>현재 브라우저에 💾 <span id="mappingCount">0</span>개의 매핑 규칙이 저장되어 있습니다.</div>
        <button class="btn-small" onclick="resetMapping()">🗑️ 초기화</button>
    </div>

    <div id="dashboardContent" class="hidden">
        <div style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="reportTitle" style="margin:0; color: #2c3e50;">📋 분석 리포트</h2>
            <button onclick="exportToProcessedFormat()" id="downloadBtn" class="btn-main">📥 가공 양식 자동 변환 (.xlsx)</button>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="summary-container">
            <div class="chart-title">상품 분류별 실적 요약</div>
            <div id="summaryTableContainer"></div>
        </div>
        <div class="charts-grid">
            <div class="chart-container"><div class="chart-title">일자별 매출 추이</div><canvas id="dailyTrendChart"></canvas></div>
            <div class="chart-container"><div class="chart-title">결제 수단별 비중</div><canvas id="paymentMethodChart"></canvas></div>
            <div class="chart-container" style="grid-column: span 2;"><div class="chart-title">상품 분류별 매출 비중</div><canvas id="topProductsChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    let MASTER_MAPPING = [];
    let charts = {};

    // 초기화: 로컬스토리지에서 매핑 로드
    function init() {
        const saved = localStorage.getItem('shinan_mapping_master');
        if (saved) {
            MASTER_MAPPING = JSON.parse(saved);
        } else {
            // 기본값 설정
            MASTER_MAPPING = [
                { keyword: '밀리터리', result: '밀리터리' }, { keyword: '시즌권', result: '스키시즌권' },
                { keyword: '원데이락커', result: '장비보관소' }, { keyword: '리프트', result: '리프트' },
                { keyword: '강습', result: '강습pkg' }, { keyword: '눈썰매', result: '눈썰매' },
                { keyword: '룸온리', result: '룸온리' }, { keyword: '설렘', result: '설렘' },
                { keyword: '힐링', result: '힐링' }, { keyword: '스키렌탈', result: '장비렌탈' },
                { keyword: '사우나이용권', result: '사우나' }, { keyword: '스마트예약 종일권', result: '워터플래닛입장권' },
                { keyword: '카바나', result: '카바나' }, { keyword: '썬베드', result: '선베드' },
                { keyword: 'wp시즌패스', result: '워터파크시즌패스' }, { keyword: '아레나', result: '아레나' }
            ];
            localStorage.setItem('shinan_mapping_master', JSON.stringify(MASTER_MAPPING));
        }
        updateMappingStatus();
    }

    function updateMappingStatus() {
        document.getElementById('mappingCount').innerText = MASTER_MAPPING.length;
    }

    function resetMapping() {
        if(confirm('모든 매핑 데이터를 삭제하고 초기화하시겠습니까?')) {
            localStorage.removeItem('shinan_mapping_master');
            location.reload();
        }
    }

    // 파일 업로드 이벤트 처리
    const mappingInput = document.getElementById('mappingInput');
    const mappingDropZone = document.getElementById('mappingDropZone');
    mappingDropZone.onclick = () => mappingInput.click();
    mappingDropZone.ondragover = (e) => { e.preventDefault(); mappingDropZone.classList.add('dragover'); };
    mappingDropZone.ondragleave = () => mappingDropZone.classList.remove('dragover');
    mappingDropZone.ondrop = (e) => { e.preventDefault(); mappingDropZone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleMappingFile(e.dataTransfer.files[0]); };
    mappingInput.onchange = (e) => { if(e.target.files.length) handleMappingFile(e.target.files[0]); };

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleDataFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => { if(e.target.files.length) handleDataFile(e.target.files[0]); };

    // 매핑 파일 처리
    function handleMappingFile(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            const newMapping = [];
            json.forEach(row => {
                const kw = getVal(row, ['검색 키워드', '키워드', 'keyword']);
                const rs = getVal(row, ['최종 분류 결과', '결과', 'result', '분류']);
                if (kw && rs) newMapping.push({ keyword: kw.toString().trim(), result: rs.toString().trim() });
            });

            if (newMapping.length > 0) {
                // 기존 데이터와 병합 (키워드 중복 제거)
                const merged = [...MASTER_MAPPING];
                newMapping.forEach(nm => {
                    const idx = merged.findIndex(m => m.keyword === nm.keyword);
                    if (idx > -1) merged[idx] = nm; else merged.push(nm);
                });
                MASTER_MAPPING = merged;
                localStorage.setItem('shinan_mapping_master', JSON.stringify(MASTER_MAPPING));
                updateMappingStatus();
                alert(newMapping.length + '개의 매핑 규칙을 성공적으로 불러왔습니다!');
            } else {
                alert('유효한 매핑 데이터를 찾을 수 없습니다. 열 이름을 확인해주세요 (검색 키워드, 최종 분류 결과)');
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // 정산 데이터 파일 처리
    function handleDataFile(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                processData(jsonData);
            } catch (err) { alert('파일 읽기 오류: ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    function parseMoney(val) {
        if (val === undefined || val === null || val === "") return 0;
        if (typeof val === 'number') return val;
        return parseInt(val.toString().replace(/[^0-9-]/g, '')) || 0;
    }

    function getVal(row, possibleNames) {
        for (let name of possibleNames) {
            if (row[name] !== undefined && row[name] !== null && row[name] !== "") return row[name];
            const cleanTarget = name.replace(/\s+/g, '').toLowerCase();
            for (let key in row) {
                if (key.toString().replace(/\s+/g, '').toLowerCase().includes(cleanTarget)) return row[key];
            }
        }
        return '';
    }

    async function exportToProcessedFormat() {
        try {
            if (!window.lastData) return alert('데이터가 없습니다.');
            const workbook = new ExcelJS.Workbook();
            
            const rawFiltered = window.lastData.filter(row => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(row, ['MID']).toString()));
            
            // 미매핑 상품 실시간 수집
            const discoveredUnmapped = new Set();
            rawFiltered.forEach(row => {
                const pName = getVal(row, ['상품명']) || '';
                let isMapped = false;
                for (const m of MASTER_MAPPING) { if (pName.includes(m.keyword)) { isMapped = true; break; } }
                if (!isMapped && pName !== '') discoveredUnmapped.add(pName);
            });

            // 1. [매핑데이터] 시트
            const mapSheet = workbook.addWorksheet('매핑데이터', { views: [{ showGridLines: false }] });
            mapSheet.getCell('B2').value = '⚙️ 상품 매핑 규칙 관리 (마스터)';
            mapSheet.getCell('B2').font = { size: 16, bold: true, color: { argb: 'FF4E73DF' } };
            
            const tHeaderRow = 10;
            mapSheet.getCell(`C${tHeaderRow}`).value = '검색 키워드';
            mapSheet.getCell(`D${tHeaderRow}`).value = '최종 분류 결과';
            ['C', 'D'].forEach(col => {
                const cell = mapSheet.getCell(`${col}${tHeaderRow}`);
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4E73DF' } };
                cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                cell.alignment = { horizontal: 'center' };
                cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
            });

            MASTER_MAPPING.forEach((m, i) => {
                mapSheet.getCell(`C${tHeaderRow+1+i}`).value = m.keyword;
                mapSheet.getCell(`D${tHeaderRow+1+i}`).value = m.result;
            });

            let currentMapRow = tHeaderRow + MASTER_MAPPING.length + 1;
            discoveredUnmapped.forEach(pName => {
                mapSheet.getCell(`C${currentMapRow}`).value = pName;
                mapSheet.getCell(`D${currentMapRow}`).value = '미분류';
                mapSheet.getCell(`D${currentMapRow}`).font = { color: { argb: 'FFFF0000' }, bold: true };
                currentMapRow++;
            });

            for (let i = 1; i <= 3000; i++) {
                ['C', 'D'].forEach(col => {
                    const cell = mapSheet.getCell(`${col}${tHeaderRow + i}`);
                    cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                    cell.font = cell.font || { size: 9 };
                });
            }
            mapSheet.getColumn('C').width = 45; mapSheet.getColumn('D').width = 30;

            const palette = ['FFE2EFDA', 'FFD9E1F2', 'FFFFF2CC', 'FFFCE4D6', 'FFE1D5E7', 'FFD5E8D4', 'FFF8CECC'];
            const resColors = { '미분류': { bg: 'FFFF0000', fg: 'FFFFFFFF' } };
            const uniqueRes = [...new Set(MASTER_MAPPING.map(m => m.result)), '미분류'];
            uniqueRes.forEach((res, i) => { if (!resColors[res]) resColors[res] = { bg: palette[i % palette.length], fg: 'FF333333' }; });

            const grouped = {};
            rawFiltered.forEach(row => {
                const d = getVal(row, ['정산일', '거래일자']) || '기타';
                const m = d.toString().match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/);
                const day = m ? `${m[2]}월${m[3]}일` : '기타';
                if (!grouped[day]) grouped[day] = [];
                grouped[day].push(row);
            });

            for (const [date, rows] of Object.entries(grouped).sort()) {
                const sheet = workbook.addWorksheet(date, { views: [{ zoomScale: 90 }], pageSetup: { orientation: 'landscape', fitToPage: true, fitToWidth: 1 } });
                sheet.properties.tabColor = { argb: palette[Object.keys(grouped).indexOf(date) % palette.length] };
                sheet.columns = [{width:6},{width:15},{width:12},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:13},{width:11},{width:10,hidden:true},{width:10,hidden:true},{width:11},{width:12,hidden:true},{width:16},{width:12,hidden:true},{width:15,hidden:true},{width:11},{width:32},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:16},{width:13},{width:13}];

                const mmdd = date.replace('월', '.').replace('일', '');
                sheet.getCell('A1').value = `■ 정산일 기준_${mmdd}`;
                sheet.getCell('A1').font = { size: 11, bold: true };

                const headerRow = sheet.getRow(3);
                headerRow.values = ['NO.', '결제 서비스명', '정산일', '승인일', '매입요청일', '취소일', '상 호', 'MID', '거래금액', '결제수수료', '에스크로수수료', '인증수수료', 'VAT', '정산금액', '카드/은행', '승인번호', '주문번호', '구매자', '상품명', '거래구분', 'TID', '상태', '원거래 TID', '변환결과(X)', '정산금액(Y)', '수수료+VAT(Z)'];
                headerRow.eachCell(c => {
                    c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9E1F2' } };
                    c.font = { bold: true, size: 9 };
                    c.alignment = { vertical: 'middle', horizontal: 'center' };
                    c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                });

                const catHit = {};
                rows.forEach((r, i) => {
                    const rIdx = i + 4;
                    const row = sheet.getRow(rIdx);
                    const pName = getVal(r, ['상품명']) || '';
                    const amt = parseMoney(getVal(r, ['거래금액', '결제금액']));

                    row.getCell(1).value = i + 1;
                    row.getCell(2).value = getVal(r, ['결제 서비스명', '결제수단']);
                    row.getCell(3).value = getVal(r, ['정산일', '거래일자']);
                    row.getCell(9).value = amt;
                    row.getCell(10).value = parseMoney(getVal(r, ['결제수수료', '수수료', '수수료합계']));
                    row.getCell(13).value = parseMoney(getVal(r, ['VAT', '부가세']));
                    row.getCell(14).value = parseMoney(getVal(r, ['정산금액', '지급금액']));
                    row.getCell(15).value = getVal(r, ['카드/은행', '카드사']);
                    row.getCell(18).value = getVal(r, ['구매자']);
                    row.getCell(19).value = pName;
                    
                    row.getCell(24).value = { formula: `IFERROR(LOOKUP(1, 0/(SEARCH(매핑데이터!$C$11:$C$5000, S${rIdx})*(매핑데이터!$C$11:$C$5000<>"")), 매핑데이터!$D$11:$D$5000), "미분류")` };
                    row.getCell(25).value = { formula: `N${rIdx}` };
                    row.getCell(26).value = { formula: `J${rIdx}+M${rIdx}` };

                    let m = '미분류';
                    for(let item of MASTER_MAPPING) { if(pName.toString().includes(item.keyword)) m = item.result; }
                    catHit[m] = true;

                    row.eachCell({ includeEmpty: false }, (cell, col) => {
                        if (col > 26) return;
                        cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                        cell.alignment = { vertical: 'middle', horizontal: 'center' };
                        cell.font = { size: 9 };
                        if ([9, 10, 13, 25, 26].includes(col)) { cell.alignment = { horizontal: 'right' }; cell.numFmt = '#,##0'; }
                        if (amt < 0 && col !== 24) cell.font.color = { argb: 'FFFF0000' };
                    });
                });

                const endRow = rows.length + 3;
                const condRules = uniqueRes.map(res => {
                    const color = resColors[res] || { bg: 'FFFFFFFF', fg: 'FF333333' };
                    return { type: 'cellIs', operator: 'equal', formulae: [`"${res}"`], style: { fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: color.bg } }, font: { color: { argb: color.fg }, bold: (res === '미분류') } } };
                });
                sheet.addConditionalFormatting({ ref: `X4:X${endRow}`, rules: condRules });

                const tIdx = endRow + 2;
                sheet.mergeCells(tIdx, 1, tIdx, 3);
                sheet.getCell(tIdx, 1).value = '합계';
                [9, 10, 13, 25, 26].forEach(c => {
                    const L = {9:'I', 10:'J', 13:'M', 25:'Y', 26:'Z'}[c];
                    const cell = sheet.getCell(tIdx, c);
                    cell.value = { formula: `SUM(${L}4:${L}${endRow})` };
                    cell.numFmt = '#,##0'; cell.font = { bold: true };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' } };
                    cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                });

                const dbS = tIdx + 2;
                const merges = [[2,3], [4,5], [6,9], [10,13], [14,17], [18,21], [22,25]];
                const labels = ['구분', '건수', '거래금액', '결제수수료', 'VAT', '정산금액', '수수료+VAT'];
                merges.forEach((m, i) => {
                    sheet.mergeCells(dbS, m[0], dbS, m[1]);
                    const c = sheet.getCell(dbS, m[0]);
                    c.value = labels[i];
                    c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4E73DF' } };
                    c.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 9 };
                    c.alignment = { horizontal: 'center' };
                    c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                });

                let curR = dbS + 1;
                uniqueRes.forEach(res => {
                    if (!catHit[res]) return;
                    const row = sheet.getRow(curR);
                    merges.forEach((m, j) => {
                        sheet.mergeCells(curR, m[0], curR, m[1]);
                        const cell = row.getCell(m[0]);
                        const xAbs = `$X$4:$X$${endRow}`;
                        if (j === 0) cell.value = res;
                        else if (j === 1) cell.value = { formula: `COUNTIF(${xAbs}, B${curR})` };
                        else {
                            const L = ['I', 'J', 'M', 'Y', 'Z'][j-2];
                            cell.value = { formula: `SUMIF(${xAbs}, B${curR}, $${L}$4:$${L}$${endRow})` };
                        }
                        cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                        if (j >= 2) { cell.alignment = { horizontal: 'right' }; cell.numFmt = '#,##0'; }
                    });
                    curR++;
                });

                sheet.mergeCells(curR, 2, curR, 3);
                sheet.getCell(curR, 2).value = '총 합계';
                merges.slice(1).forEach((m, j) => {
                    sheet.mergeCells(curR, m[0], curR, m[1]);
                    const cell = sheet.getCell(curR, m[0]);
                    const L = ['D', 'F', 'J', 'N', 'R', 'V'][j];
                    cell.value = { formula: `SUM(${L}${dbS+1}:${L}${curR-1})` };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9E1F2' } };
                    cell.font = { bold: true };
                    cell.numFmt = '#,##0';
                    cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                });

                sheet.autoFilter = 'A3:Z3';
                [4, 5, 6, 7, 8, 11, 12, 14, 16, 17, 20, 21, 22, 23].forEach(c => sheet.getColumn(c).hidden = true);
            }

            const buf = await workbook.xlsx.writeBuffer();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([buf]));
            link.download = `나이스페이_정산보고서_${new Date().toISOString().slice(0,10)}.xlsx`;
            link.click();
        } catch (err) { alert('오류: ' + err.message); }
    }

    function processData(data) {
        const filtered = data.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
        window.lastData = data;
        
        let totalGross = 0, totalNet = 0, totalFee = 0, cancelCount = 0, cancelAmt = 0;
        const dailyData = {}, payMethodData = {}, productData = {};

        filtered.forEach(r => {
            const amt = parseMoney(getVal(r, ['거래금액', '결제금액']));
            const net = parseMoney(getVal(r, ['정산금액', '지급금액']));
            const fee = parseMoney(getVal(r, ['결제수수료', '수수료', '수수료합계']));
            const vat = parseMoney(getVal(r, ['VAT', '부가세']));
            const method = getVal(r, ['결제 서비스명', '결제수단']) || '기타';
            const pName = getVal(r, ['상품명']) || '미지정';
            const dateVal = getVal(r, ['정산일', '거래일자']) || '기타';
            
            let dateKey = '기타';
            const m = dateVal.toString().match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/);
            if (m) dateKey = `${m[1]}-${m[2]}-${m[3]}`;

            totalGross += amt; totalNet += net; totalFee += (fee + vat);
            if (amt < 0) { cancelCount++; cancelAmt += Math.abs(amt); }

            dailyData[dateKey] = (dailyData[dateKey] || 0) + amt;
            payMethodData[method] = (payMethodData[method] || 0) + amt;
            
            let mappedCat = '미분류';
            for (let item of MASTER_MAPPING) { if (pName.includes(item.keyword)) { mappedCat = item.result; break; } }
            if (!productData[mappedCat]) productData[mappedCat] = { count: 0, amt: 0 };
            productData[mappedCat].count++;
            productData[mappedCat].amt += amt;
        });

        const avgAmt = filtered.length ? Math.round(totalGross / filtered.length) : 0;
        const feeRate = totalGross ? ((totalFee / totalGross) * 100).toFixed(2) : 0;

        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>총 거래 금액</h3><div class="value">${totalGross.toLocaleString()}원</div><div class="sub-text">전체 ${filtered.length.toLocaleString()}건 결제</div></div>
            <div class="stat-card" style="border-left-color: var(--success)"><h3>순 정산 예정액</h3><div class="value">${totalNet.toLocaleString()}원</div><div class="sub-text">수수료 제외 실수령액</div></div>
            <div class="stat-card" style="border-left-color: var(--warning)"><h3>실질 수수료 (VAT포함)</h3><div class="value">${totalFee.toLocaleString()}원</div><div class="sub-text">평균 수수료율: ${feeRate}%</div></div>
            <div class="stat-card" style="border-left-color: var(--danger)"><h3>취소 발생</h3><div class="value">${cancelAmt.toLocaleString()}원</div><div class="sub-text">총 ${cancelCount}건의 취소/환불</div></div>
            <div class="stat-card" style="border-left-color: var(--info)"><h3>평균 객단가</h3><div class="value">${avgAmt.toLocaleString()}원</div><div class="sub-text">1건당 평균 결제 금액</div></div>
        `;

        let tableHtml = `<table class="summary-table"><thead><tr><th>상품 분류</th><th class="num">결제 건수</th><th class="num">거래 금액</th><th class="num">매출 비중</th></tr></thead><tbody>`;
        Object.entries(productData).sort((a, b) => b[1].amt - a[1].amt).forEach(([cat, data]) => {
            const ratio = ((data.amt / totalGross) * 100).toFixed(1);
            tableHtml += `<tr><td><strong>${cat}</strong></td><td class="num">${data.count.toLocaleString()}건</td><td class="num">${data.amt.toLocaleString()}원</td><td class="num">${ratio}%</td></tr>`;
        });
        tableHtml += `</tbody></table>`;
        document.getElementById('summaryTableContainer').innerHTML = tableHtml;

        renderCharts(dailyData, payMethodData, productData);
        document.getElementById('dashboardContent').classList.remove('hidden');
        document.getElementById('reportTitle').innerText = `📋 분석 리포트 (${Object.keys(dailyData)[0]} ~ ${Object.keys(dailyData).pop()})`;
    }

    function renderCharts(daily, methods, products) {
        Object.values(charts).forEach(c => c.destroy());
        const dailyLabels = Object.keys(daily).sort();
        charts.daily = new Chart(document.getElementById('dailyTrendChart'), { type: 'line', data: { labels: dailyLabels.map(d => d.substring(5)), datasets: [{ label: '일별 매출', data: dailyLabels.map(l => daily[l]), borderColor: '#4e73df', backgroundColor: 'rgba(78, 115, 223, 0.05)', fill: true, tension: 0.3 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        charts.method = new Chart(document.getElementById('paymentMethodChart'), { type: 'doughnut', data: { labels: Object.keys(methods), datasets: [{ data: Object.values(methods), backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'] }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } } } });
        const productEntries = Object.entries(products).sort((a, b) => b[1].amt - a[1].amt);
        charts.product = new Chart(document.getElementById('topProductsChart'), { type: 'bar', data: { labels: productEntries.map(e => e[0]), datasets: [{ label: '매출액', data: productEntries.map(e => e[1].amt), backgroundColor: '#4e73df' }] }, options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { callback: v => (v/10000).toLocaleString() + '만' } } } } });
    }

    window.onload = init;
</script>
</body>
