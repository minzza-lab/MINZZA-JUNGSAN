<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINZZA | 통합 정산 가공 시스템 v4.6</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --info: #36b9cc; --warning: #f6c23e; --danger: #e74a3b; --dark: #5a5c69; --bg: #f8f9fc; --border: #e3e6f0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 1450px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .card-title { font-size: 1.2rem; font-weight: 800; color: #2c3e50; display: flex; align-items: center; gap: 10px; }
        .table-wrapper { max-height: 450px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f8f9fc; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); color: var(--primary); font-weight: 700; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .input-inline { border: 1px solid #ddd; padding: 10px 14px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 0.9rem; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { color: var(--danger); background: #fff5f5; border: 1px solid #ffcccc; }
        .upload-area { background: white; border: 3px dashed var(--primary); border-radius: 12px; padding: 50px 20px; text-align: center; cursor: pointer; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; border-left: 6px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .charts-container { display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px; margin-bottom: 30px; height: 420px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 100%; display: flex; flex-direction: column; }
        .hidden { display: none; }
        .badge { padding: 4px 10px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; }
        .badge-info { background: #eef2ff; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: #1e293b; padding: 20px 30px; border-radius: 12px; color: white;">
        <div>
            <h1 style="margin:0; font-size: 1.6rem; font-weight: 900;">📊 MINZZA 정산 시스템 <span style="font-weight: 300; font-size: 1rem; opacity: 0.7;">v4.6 PRO</span></h1>
            <p style="margin:5px 0 0; font-size: 0.8rem; opacity: 0.6;">디테일 강화 및 카드사 매칭 최적화 버전</p>
        </div>
        <div style="display:flex; gap:12px;">
            <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="exportConfigToExcel()">📥 설정 내보내기</button>
            <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="document.getElementById('configInput').click()">📤 설정 가져오기</button>
            <input type="file" id="configInput" class="hidden" accept=".xlsx" onchange="importConfigFromExcel(this)">
            <a href="index.html" class="btn btn-primary">대시보드 홈</a>
        </div>
    </header>

    <div class="card">
        <div class="card-header"><div class="card-title">⚙️ 상품 매칭 마스터</div><button class="btn btn-danger" onclick="resetMapping()">초기화</button></div>
        <div id="unclassifiedSection" class="hidden" style="background:#fff5f5; border:2px solid var(--danger); border-radius:12px; padding:20px; margin-bottom:20px;">
            <h3 style="margin:0 0 15px 0; color:var(--danger);">⚠️ 검토 필요 상품 (<span id="unclassifiedCount">0</span>건)</h3>
            <div class="table-wrapper" style="background:white;"><table class="mapping-table"><thead><tr style="background:#fff1f0;"><th>신규 상품명</th><th>분류 지정</th><th style="width:60px;"></th></tr></thead><tbody id="unclassifiedTableBody"></tbody></table></div>
        </div>
        <div class="table-wrapper"><table class="mapping-table"><thead><tr><th>키워드</th><th>최종 분류 결과</th><th style="width:60px; text-align:center;">삭제</th></tr></thead><tbody id="mappingTableBody"></tbody></table></div>
        <div style="display:flex; gap:12px; background:#f8f9fc; padding:20px; border-radius:12px;"><input type="text" id="newKeyword" class="input-inline" style="flex:2;" placeholder="키워드 추가..."><input type="text" id="newResult" class="input-inline" style="flex:1;" placeholder="결과명..."><button class="btn btn-primary" onclick="addMappingRule()">추가</button></div>
    </div>

    <div class="card" style="border-top-color: var(--info);">
        <div class="card-header"><div class="card-title">🧩 수수료 안분 엔진</div><button class="btn btn-danger" onclick="resetAlloMapping()">초기화</button></div>
        <div class="table-wrapper" style="max-height: 550px; overflow-x: auto;"><table class="mapping-table" style="min-width: 1300px;"><thead><tr style="background:#f0faff;"><th style="width:160px; position:sticky; left:0; background:#f0faff; z-index:11; border-right:2px solid var(--border);">상품 분류</th><th style="width:130px;">최저가</th><th>안분 1</th><th>안분 2</th><th>안분 3</th><th>안분 4</th><th>안분 5</th><th>안분 6</th><th style="width:90px; text-align:center; background:#fffde7; font-weight:900;">합계</th></tr></thead><tbody id="alloTableBody"></tbody></table></div>
    </div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size: 3.5rem;">📥</div><h3>정산 로우데이터 파일을 업로드하세요</h3><p style="color:#64748b;">Excel 또는 CSV 파일을 이곳에 놓으세요.</p><input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .csv">
    </div>

    <div id="dashboardContent" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;"><h2 id="reportTitle" style="margin:0; font-size:1.8rem; font-weight:900;">📋 분석 리포트</h2><button class="btn btn-primary" style="background:var(--success); padding:15px 35px;" onclick="exportToProcessedFormat()">📥 최종 가공 엑셀 다운로드</button></div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="charts-container"><div class="chart-card"><div class="chart-title">📈 거래 금액 추이</div><canvas id="dailyTrendChart"></canvas></div><div class="chart-card"><div class="chart-title">💳 결제 수단 비중</div><canvas id="paymentMethodChart"></canvas></div></div>
        <div class="card"><div class="chart-title">📊 상세 실적 요약</div><div id="summaryTableContainer"></div><div style="height:350px; margin-top:40px;"><canvas id="topProductsChart"></canvas></div></div>
    </div>
</div>

<script>
    let MASTER_MAPPING = []; let ALLO_MAPPING = {}; let charts = {}; let currentRawData = null;

    function init() {
        const savedM = localStorage.getItem('shinan_mapping_master_v4');
        if (savedM && JSON.parse(savedM).length > 0) MASTER_MAPPING = JSON.parse(savedM);
        else { MASTER_MAPPING = [{ keyword: '리프트', result: '리프트' }, { keyword: '눈썰매', result: '눈썰매' }, { keyword: '시즌권', result: '스키시즌권' }, { keyword: '룸온리', result: '객실' }]; saveMapping(); }
        const savedA = localStorage.getItem('shinan_allo_mapping_v3'); if (savedA) ALLO_MAPPING = JSON.parse(savedA);
        renderMappingTable(); renderAlloTable();
    }

    function saveMapping() { localStorage.setItem('shinan_mapping_master_v4', JSON.stringify(MASTER_MAPPING)); }
    function saveAlloMapping() { localStorage.setItem('shinan_allo_mapping_v3', JSON.stringify(ALLO_MAPPING)); }
    function resetMapping() { if (confirm('초기화할까요?')) { localStorage.removeItem('shinan_mapping_master_v4'); location.reload(); } }
    function resetAlloMapping() { if (confirm('초기화할까요?')) { localStorage.removeItem('shinan_allo_mapping_v3'); location.reload(); } }

    function renderMappingTable() {
        const unTbody = document.getElementById('unclassifiedTableBody'), msTbody = document.getElementById('mappingTableBody');
        const unSection = document.getElementById('unclassifiedSection'), unCount = document.getElementById('unclassifiedCount');
        const itemsNew = [], itemsReview = [], itemsMaster = [];
        MASTER_MAPPING.forEach((m, i) => { const item = { ...m, originalIndex: i }; if (m.result === '미분류') { if (m.suggestion) itemsReview.push(item); else itemsNew.push(item); } else itemsMaster.push(item); });
        let unHtml = '';
        if (itemsNew.length > 0) {
            unHtml += `<tr style="background:#fee2e2; font-weight:900;"><td colspan="3" style="color:var(--danger); padding:12px;">❓ 신규 발견 상품</td></tr>`;
            itemsNew.forEach(it => unHtml += `<tr><td>${it.keyword}</td><td><input type="text" class="input-inline" onchange="updateMappingResult(${it.originalIndex}, this.value)"></td><td><button class="btn-danger" style="padding:2px 8px;" onclick="deleteMappingRule(${it.originalIndex})">&times;</button></td></tr>`);
        }
        if (itemsReview.length > 0) {
            unHtml += `<tr style="background:#fef3c7; font-weight:900;"><td colspan="3" style="color:#92400e; padding:12px;">🔍 복합 구성 의심</td></tr>`;
            itemsReview.forEach(it => unHtml += `<tr><td>${it.keyword}<br><small style="color:#666;">기존 '${it.suggestedBy}'와 유사</small></td><td><div style="display:flex; gap:8px;"><input type="text" class="input-inline" onchange="updateMappingResult(${it.originalIndex}, this.value)"><button class="btn btn-primary" style="padding:5px 10px; font-size:0.75rem; white-space:nowrap;" onclick="updateMappingResult(${it.originalIndex}, '${it.suggestion}')">승인: ${it.suggestion}</button></div></td><td><button class="btn-danger" style="padding:2px 8px;" onclick="deleteMappingRule(${it.originalIndex})">&times;</button></td></tr>`);
        }
        unTbody.innerHTML = unHtml; if (itemsNew.length + itemsReview.length > 0) { unSection.classList.remove('hidden'); unCount.innerText = itemsNew.length + itemsReview.length; } else unSection.classList.add('hidden');
        const groups = {}; itemsMaster.forEach(it => { const prefix = it.keyword.substring(0, 8); const key = `${prefix}_${it.result}`; if (!groups[key]) groups[key] = []; groups[key].push(it); });
        let msHtml = '';
        Object.keys(groups).sort().forEach(k => {
            const group = groups[k], prefix = group[0].keyword.substring(0, 8);
            if (group.length > 1) {
                msHtml += `<tr style="background:#f1f5f9; font-weight:900; border-left:6px solid var(--primary);"><td colspan="1">📦 ${prefix}... (${group.length})</td><td><input type="text" class="input-inline" value="${group[0].result}" onchange="updateGroupResult('${prefix}', this.value)"></td><td style="text-align:center;"><button class="btn btn-outline" style="padding:4px 10px;" onclick="toggleGroup('${k}')">📂</button></td></tr>`;
                if (localStorage.getItem(`group_expand_${k}`) !== 'false') group.forEach(it => msHtml += `<tr style="font-size:0.85rem;"><td style="padding-left:35px; color:#64748b;">└ ${it.keyword}</td><td><input type="text" class="input-inline" value="${it.result}" onchange="updateMappingResult(${it.originalIndex}, this.value)"></td><td style="text-align:center;"><button class="btn-danger" style="padding:2px 8px;" onclick="deleteMappingRule(${it.originalIndex})">&times;</button></td></tr>`);
            } else { msHtml += `<tr><td>${group[0].keyword}</td><td><input type="text" class="input-inline" value="${group[0].result}" onchange="updateMappingResult(${group[0].originalIndex}, this.value)"></td><td style="text-align:center;"><button class="btn-danger" style="padding:2px 8px;" onclick="deleteMappingRule(${group[0].originalIndex})">&times;</button></td></tr>`; }
        });
        msTbody.innerHTML = msHtml || '<tr><td colspan="3" style="text-align:center; padding:50px;">등록된 규칙 없음</td></tr>';
    }

    function updateMappingResult(idx, val) {
        const nv = val.trim(); if (!nv) return; const ov = MASTER_MAPPING[idx].result; MASTER_MAPPING[idx].result = nv; MASTER_MAPPING[idx].suggestion = null;
        if (ov !== '미분류' && ALLO_MAPPING[ov]) { ALLO_MAPPING[nv] = ALLO_MAPPING[ov]; delete ALLO_MAPPING[ov]; }
        saveMapping(); saveAlloMapping(); renderMappingTable(); renderAlloTable(); if (currentRawData) processData(currentRawData);
    }

    function updateGroupResult(prefix, val) {
        const nv = val.trim(); if (!nv) return;
        MASTER_MAPPING.forEach(m => { if (m.keyword.startsWith(prefix)) { const ov = m.result; m.result = nv; m.suggestion = null; if (ov !== '미분류' && ALLO_MAPPING[ov]) { ALLO_MAPPING[nv] = ALLO_MAPPING[ov]; delete ALLO_MAPPING[ov]; } } });
        saveMapping(); saveAlloMapping(); renderMappingTable(); renderAlloTable(); if (currentRawData) processData(currentRawData);
    }

    function addMappingRule() { const kw = document.getElementById('newKeyword').value.trim(), rs = document.getElementById('newResult').value.trim() || '미분류'; if (!kw) return; MASTER_MAPPING.unshift({ keyword: kw, result: rs }); document.getElementById('newKeyword').value = ''; document.getElementById('newResult').value = ''; saveMapping(); renderMappingTable(); renderAlloTable(); if (currentRawData) processData(currentRawData); }
    function deleteMappingRule(idx) { if (confirm('삭제할까요?')) { MASTER_MAPPING.splice(idx, 1); saveMapping(); renderMappingTable(); renderAlloTable(); if (currentRawData) processData(currentRawData); } }
    function toggleGroup(k) { const cur = localStorage.getItem(`group_expand_${k}`) !== 'false'; localStorage.setItem(`group_expand_${k}`, !cur); renderMappingTable(); }

    function renderAlloTable() {
        const tbody = document.getElementById('alloTableBody'); if (!tbody) return;
        const categories = [...new Set(MASTER_MAPPING.map(m => m.result))].filter(c => c !== '미분류').sort();
        let html = '';
        categories.forEach(cat => {
            if (!ALLO_MAPPING[cat]) ALLO_MAPPING[cat] = { basePrice: 0, items: Array(6).fill(0).map(() => ({ target:'', price:0, rate:0 })) };
            const data = ALLO_MAPPING[cat]; let rowSum = 0; data.items.forEach(it => rowSum += Math.round(it.rate || 0));
            html += `<tr><td style="font-weight:900; color:var(--primary); position:sticky; left:0; background:white; z-index:5; border-right:2px solid var(--border);">${cat}</td>
                <td style="background:#f8fafc;"><input type="number" class="input-inline" style="text-align:right; font-weight:bold;" value="${data.basePrice}" onchange="updateAlloBasePrice('${cat}', this.value)"></td>
                ${data.items.map((it, i) => `<td><div style="display:flex; flex-direction:column; gap:4px;"><input type="text" class="input-inline" style="font-size:0.8rem;" value="${it.target}" onchange="updateAlloItem('${cat}',${i},'target',this.value)"><div style="display:flex; align-items:center; gap:4px;"><input type="number" class="input-inline" style="flex:1; text-align:right; font-size:0.8rem;" value="${it.price}" onchange="updateAlloItemPrice('${cat}',${i},this.value)"><span class="badge badge-info">${Math.round(it.rate)}%</span></div></div></td>`).join('')}
                <td style="text-align:center; background:#fffde7; font-weight:900; color:${rowSum===100?'var(--success)':'var(--danger)'}; font-size:1.1rem;">${rowSum}%</td></tr>`;
        });
        tbody.innerHTML = html || '<tr><td colspan="9" style="text-align:center; padding:50px;">매핑을 먼저 완료하세요.</td></tr>';
        saveAlloMapping();
    }

    function updateAlloBasePrice(cat, v) { const b = parseFloat(v) || 0; ALLO_MAPPING[cat].basePrice = b; ALLO_MAPPING[cat].items.forEach(it => it.rate = b > 0 ? (it.price/b)*100 : 0); renderAlloTable(); }
    function updateAlloItem(cat, i, f, v) { ALLO_MAPPING[cat].items[i][f] = v; saveAlloMapping(); }
    function updateAlloItemPrice(cat, i, v) { const p = parseFloat(v) || 0, b = ALLO_MAPPING[cat].basePrice || 0; const curSum = ALLO_MAPPING[cat].items.reduce((s, it, idx) => idx === i ? s : s + (it.price || 0), 0); if (b > 0 && (curSum + p) > b) return alert('최저가 초과'); ALLO_MAPPING[cat].items[i].price = p; if (b > 0) ALLO_MAPPING[cat].items[i].rate = (p/b)*100; renderAlloTable(); }

    const fileInput = document.getElementById('fileInput'), dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--success)'; dropZone.style.background = '#f0fdf4'; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = 'var(--primary)'; dropZone.style.background = 'white'; };
    dropZone.ondrop = (e) => { e.preventDefault(); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => { if(e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(file) {
        const reader = new FileReader(); reader.onload = (evt) => {
            try { const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array', cellDates: true }); const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" }); detectNewProducts(jsonData); currentRawData = jsonData; processData(jsonData); }
            catch (err) { alert('파일 읽기 오류: ' + err.message); }
        }; reader.readAsArrayBuffer(file);
    }

    function detectNewProducts(data) {
        const filtered = data.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
        const sm = [...MASTER_MAPPING].filter(m => m.result !== '미분류').sort((a,b) => b.keyword.length - a.keyword.length);
        filtered.forEach(row => {
            const pName = (getVal(row, ['상품명']) || '').trim(); if (!pName) return;
            let best = null; for (let m of sm) { if (pName.toLowerCase().includes(m.keyword.trim().toLowerCase())) { best = m; break; } }
            if (best) { if (['+', '&', '/', 'pkg', '렌탈', '장비'].some(i => pName.toLowerCase().includes(i) && !best.keyword.toLowerCase().includes(i)) || pName.length - best.keyword.length > 10) { if (!MASTER_MAPPING.some(m => m.keyword === pName)) MASTER_MAPPING.unshift({ keyword: pName, result: '미분류', suggestion: best.result, suggestedBy: best.keyword }); } }
            else { if (!MASTER_MAPPING.some(m => m.keyword.toLowerCase() === pName.toLowerCase())) MASTER_MAPPING.unshift({ keyword: pName, result: '미분류' }); }
        });
        saveMapping(); renderMappingTable();
    }

    function parseMoney(v) { return !v ? 0 : (typeof v === 'number' ? v : parseInt(v.toString().replace(/[^0-9-]/g, '')) || 0); }
    function getVal(r, ns) { for (let n of ns) { if (r[n] !== undefined && r[n] !== null && r[n] !== "") return r[n]; let t = n.replace(/\s+/g,'').toLowerCase(); for (let k in r) { if (k.toString().replace(/\s+/g,'').toLowerCase().includes(t)) return r[k]; } } return ''; }

    function processData(data) {
        const filtered = data.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
        if (filtered.length === 0) return alert('분석할 데이터가 없습니다.');
        let gross=0, net=0, fee=0, cAmt=0; const daily={}, methods={}, products={};
        const sortedM = [...MASTER_MAPPING].sort((a,b) => b.keyword.length - a.keyword.length);
        filtered.forEach(r => {
            const a = parseMoney(getVal(r, ['거래금액', '결제금액'])), n = parseMoney(getVal(r, ['정산금액', '지급금액'])), f = parseMoney(getVal(r, ['결제수수료', '수수료'])) + parseMoney(getVal(r, ['VAT', '부가세']));
            const p = (getVal(r, ['상품명']) || '미지정').trim(), dVal = getVal(r, ['정산일', '거래일자']).toString();
            let dKey = '기타'; const m = dVal.match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/); if (m) dKey = `${m[1]}-${m[2]}-${m[3]}`;
            gross+=a; net+=n; fee+=f; if (a<0) cAmt+=Math.abs(a); daily[dKey] = (daily[dKey]||0)+a;
            const pm = getVal(r, ['결제 서비스명', '결제수단']) || '기타'; methods[pm] = (methods[pm]||0)+a;
            let cat = '미분류'; for (let item of sortedM) { if (p.toLowerCase().includes(item.keyword.trim().toLowerCase())) { cat = item.result; break; } }
            if (!products[cat]) products[cat] = { count:0, amt:0 }; products[cat].count++; products[cat].amt += a;
        });
        document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-label">총 거래 금액</div><div class="stat-value">${gross.toLocaleString()}원</div></div><div class="stat-card" style="border-left-color:var(--success)"><div class="stat-label">순 정산 예정액</div><div class="stat-value">${net.toLocaleString()}원</div></div><div class="stat-card" style="border-left-color:var(--warning)"><div class="stat-label">실질 수수료</div><div class="stat-value">${fee.toLocaleString()}원</div></div><div class="stat-card" style="border-left-color:var(--danger)"><div class="stat-label">취소 및 환불</div><div class="value">${cAmt.toLocaleString()}원</div></div>`;
        let tb = `<table class="summary-table"><thead><tr style="background:#f8f9fc;border-bottom:2px solid #e3e6f0;"><th>분류</th><th>건수</th><th>총 금액</th><th>비중</th></tr></thead><tbody>`;
        Object.entries(products).sort((a,b)=>b[1].amt - a[1].amt).forEach(([c, d]) => { tb += `<tr><td><strong>${c}</strong></td><td>${d.count.toLocaleString()}건</td><td style="font-weight:800;">${d.amt.toLocaleString()}원</td><td><span class="badge badge-info">${((d.amt/gross)*100).toFixed(1)}%</span></td></tr>`; });
        document.getElementById('summaryTableContainer').innerHTML = tb + `</tbody></table>`;
        renderCharts(daily, methods, products); document.getElementById('dashboardContent').classList.remove('hidden');
        const sD = Object.keys(daily).sort(); document.getElementById('reportTitle').innerText = `📊 분석 데이터 리포트 (${sD[0]} ~ ${sD[sD.length-1]})`;
    }

    async function exportConfigToExcel() {
        const wb = new ExcelJS.Workbook();
        const s1 = wb.addWorksheet('매핑설정'); s1.columns = [{header:'keyword',key:'keyword',width:40},{header:'result',key:'result',width:30}]; MASTER_MAPPING.forEach(m=>s1.addRow(m));
        const s2 = wb.addWorksheet('알로안분'); const cols = [{header:'cat',key:'cat',width:20},{header:'base',key:'base',width:15}]; for(let i=1;i<=6;i++){cols.push({header:`t${i}`,key:`t${i}`,width:15},{header:`p${i}`,key:`p${i}`,width:12});} s2.columns=cols;
        Object.entries(ALLO_MAPPING).forEach(([c,d])=>{const r={cat:c,base:d.basePrice}; d.items.forEach((it,i)=>{r[`t${i+1}`]=it.target;r[`p${i+1}`]=it.price;}); s2.addRow(r);});
        const b = await wb.xlsx.writeBuffer(); const l=document.createElement('a'); l.href=URL.createObjectURL(new Blob([b])); l.download=`정산_설정백업.xlsx`; l.click();
    }

    function importConfigFromExcel(input) {
        const r = new FileReader(); r.onload=async(e)=>{
            const wb=new ExcelJS.Workbook(); await wb.xlsx.load(e.target.result);
            const nM=[], nA={}; const s1=wb.getWorksheet('매핑설정'), s2=wb.getWorksheet('알로안분');
            if(s1) s1.eachRow((row,i)=>{if(i>1&&row.getCell(1).text)nM.push({keyword:row.getCell(1).text.trim(),result:row.getCell(2).text.trim()||'미분류'});});
            if(s2) s2.eachRow((row,i)=>{if(i>1&&row.getCell(1).text){const c=row.getCell(1).text.trim(), b=parseFloat(row.getCell(2).value)||0, its=[]; for(let j=0;j<6;j++){const t=row.getCell(3+j*2).text.trim(), p=parseFloat(row.getCell(4+j*2).value)||0; its.push({target:t,price:p,rate:b>0?(p/b)*100:0});} nA[c]={basePrice:b,items:its};}});
            if(confirm('덮어씌울까요?')) { MASTER_MAPPING=nM; ALLO_MAPPING=nA; saveMapping(); saveAlloMapping(); renderMappingTable(); renderAlloTable(); }
        }; r.readAsArrayBuffer(input.files[0]);
    }

    async function exportToProcessedFormat() {
        try {
            const wb = new ExcelJS.Workbook();
            const raw = currentRawData.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
            const pal = ['FFE2EFDA', 'FFD9E1F2', 'FFFFF2CC', 'FFFCE4D6', 'FFE1D5E7', 'FFD5E8D4', 'FFF8CECC'];
            const resC = { '미분류': {bg:'FFFF0000',fg:'FFFFFFFF'}};
            [...new Set(MASTER_MAPPING.map(m=>m.result))].forEach((res, i) => { if (!resC[res]) resC[res] = { bg: pal[i % pal.length], fg: 'FF333333' }; });

            const ms = wb.addWorksheet('매핑데이터', { views: [{ showGridLines: false }] });
            ms.getCell('B2').value = '⚙️ 상품 매핑 규칙 마스터'; ms.getCell('B2').font = { size: 14, bold: true, color: { argb: 'FF4E73DF' } };
            ms.getCell('C5').value = '검색 키워드'; ms.getCell('D5').value = '최종 분류 결과';
            ['C', 'D'].forEach(col => { const c = ms.getCell(`${col}5`); c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4E73DF' } }; c.font = { bold: true, color: { argb: 'FFFFFFFF' } }; c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} }; });
            MASTER_MAPPING.slice().sort((a,b)=>a.keyword.length-b.keyword.length).forEach((m,i)=>{ const r=i+6; ms.getCell(`C${r}`).value=m.keyword; ms.getCell(`D${r}`).value=m.result; ['C','D'].forEach(c=>ms.getCell(`${c}${r}`).border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}}); });
            ms.getColumn('C').width=40; ms.getColumn('D').width=30;

            const grouped = {}; raw.forEach(r => { const d=getVal(r,['정산일','거래일자']).toString(), m=d.match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/), day=m?`${m[2]}월${m[3]}일`:'기타'; if(!grouped[day])grouped[day]=[]; grouped[day].push(r); });
            for (const [date, rows] of Object.entries(grouped).sort()) {
                const s = wb.addWorksheet(date, { views: [{ zoomScale: 90 }] });
                s.properties.tabColor = { argb: pal[Object.keys(grouped).indexOf(date) % pal.length] };
                
                // A1 제목 추가
                s.mergeCells('A1:Z1');
                const title = s.getCell('A1');
                title.value = `■ 나이스페이 정산_${date.replace('월','.').replace('일','')}`;
                title.font = { size: 14, bold: true };
                title.alignment = { horizontal: 'center' };

                s.columns = [{width:6},{width:15},{width:12},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:13},{width:11},{width:10,hidden:true},{width:10,hidden:true},{width:11},{width:12,hidden:true},{width:16},{width:12,hidden:true},{width:15,hidden:true},{width:11},{width:32},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:12,hidden:true},{width:16},{width:13},{width:13}];
                
                const hR = s.getRow(3); hR.values = ['NO.', '결제 서비스명', '정산일', '승인일', '매입요청일', '취소일', '상 호', 'MID', '거래금액', '결제수수료', '에스크로수수료', '인증수수료', 'VAT', '정산금액', '카드사', '승인번호', '주문번호', '구매자', '상품명', '거래구분', 'TID', '상태', '원TID', '변환결과(X)', '정산금액(Y)', '수수료+VAT(Z)'];
                hR.eachCell(c => { c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9E1F2' } }; c.font = { bold: true, size: 9 }; c.alignment = { horizontal: 'center' }; c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} }; });
                
                const hit = {}; const sm = [...MASTER_MAPPING].sort((a,b)=>b.keyword.length-a.keyword.length);
                rows.forEach((r, i) => {
                    const ri=i+4, row=s.getRow(ri), p=(getVal(r,['상품명'])||'').trim(), a=parseMoney(getVal(r,['거래금액','결제금액']));
                    // 카드사 매칭 강화: 카드사, 발급사, 카드/은행 등 다양한 키워드 확인
                    const cardInfo = getVal(r, ['카드사', '발급사', '카드/은행', '결제수단']) || '';
                    
                    row.getCell(1).value=i+1; row.getCell(2).value=getVal(r, ['결제 서비스명', '결제수단']); row.getCell(3).value=getVal(r,['정산일', '거래일자']); row.getCell(9).value=a; row.getCell(10).value=parseMoney(getVal(r,['결제수수료'])); row.getCell(13).value=parseMoney(getVal(r,['VAT'])); row.getCell(14).value=parseMoney(getVal(r,['정산금액', '지급금액'])); row.getCell(15).value=cardInfo; row.getCell(18).value=getVal(r,['구매자']); row.getCell(19).value=p;
                    row.getCell(24).value={formula:`IFERROR(LOOKUP(1,0/(FIND(UPPER(매핑데이터!$C$6:$C$5000),UPPER(S${ri}))*(매핑데이터!$C$6:$C$5000<>"")),매핑데이터!$D$6:$D$5000),"미분류")`};
                    row.getCell(25).value={formula:`N${ri}`}; row.getCell(26).value={formula:`J${ri}+M${ri}`};
                    
                    let cat='미분류'; for(let it of sm){if(p.toLowerCase().includes(it.keyword.trim().toLowerCase())){cat=it.result;break;}} hit[cat]=true;
                    
                    row.eachCell({ includeEmpty: true }, (cell, col) => { 
                        if(col<=26){
                            cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}}; 
                            cell.font={size:9}; 
                            // 정렬: 금액관련(9,10,13,14,25,26)은 우측, 나머지는 가운데
                            if([9,10,13,14,25,26].includes(col)){ cell.numFmt='#,##0'; cell.alignment={horizontal:'right'}; }
                            else { cell.alignment={horizontal:'center'}; }
                            // 음수 빨간색
                            if(a < 0) cell.font.color = { argb: 'FFFF0000' };
                        } 
                    });
                });

                const endR = rows.length+3, sumR = endR+2;
                s.mergeCells(sumR,1,sumR,3); 
                const sumLabel = s.getCell(sumR,1); sumLabel.value='합계'; sumLabel.alignment={horizontal:'center'}; sumLabel.font={bold:true};
                [9,10,13,14,25,26].forEach(c => { 
                    const L={9:'I',10:'J',13:'M',14:'N',25:'Y',26:'Z'}[c]; 
                    const cell=s.getCell(sumR,c); 
                    cell.value={formula:`SUM(${L}4:${L}${endR})`}; 
                    cell.numFmt='#,##0'; cell.font={bold:true}; cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; 
                    cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}}; 
                });
                s.addConditionalFormatting({ ref: `X4:X${endR}`, rules: Object.entries(resC).map(([res, st]) => ({ type:'cellIs', operator:'equal', formulae:[`"${res}"`], style:{fill:{type:'pattern',pattern:'solid',bgColor:{argb:st.bg}}, font:{color:{argb:st.fg}}} })) });
                
                const dbS = sumR+2; const merges = [[2,3], [4,5], [6,9], [10,13], [14,17], [18,21], [22,25]]; const labels = ['구분','건수','거래금액','결제수수료','VAT','정산금액','수수료+VAT'];
                merges.forEach((m, i) => { s.mergeCells(dbS, m[0], dbS, m[1]); const c = s.getCell(dbS, m[0]); c.value = labels[i]; c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4E73DF' } }; c.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 9 }; c.alignment = { horizontal: 'center' }; c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} }; });
                let curR = dbS + 1; Object.keys(hit).sort().forEach(res => {
                    merges.forEach((m, j) => { s.mergeCells(curR, m[0], curR, m[1]); const cell = s.getCell(curR, m[0]); if(j===0) { cell.value=res; cell.alignment={horizontal:'center'}; } else if(j===1) cell.value={formula:`COUNTIF($X$4:$X$${endR}, B${curR})`}; else { const L=['I','J','M','N','Y','Z'][j-2]; cell.value={formula:`SUMIF($X$4:$X$${endR}, B${curR}, $${L}$4:$${L}$${endR})`}; } cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}}; if(j>=1) { cell.numFmt='#,##0'; cell.alignment={horizontal:'right'}; } });
                    curR++;
                });
                merges.forEach((m, j) => { s.mergeCells(curR, m[0], curR, m[1]); const cell = s.getCell(curR, m[0]); if(j===0) { cell.value='전체 합계'; cell.alignment={horizontal:'center'}; } else { const L=['D', 'F', 'J', 'N', 'R', 'V', 'Z'][j]; cell.value={formula:`SUM(${L}${dbS+1}:${L}${curR-1})`}; } cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; cell.font={bold:true}; cell.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}}; if(j>=1) { cell.numFmt='#,##0'; cell.alignment={horizontal:'right'}; } });
                s.autoFilter = 'A3:Z3';
            }
            const b = await wb.xlsx.writeBuffer(); const l=document.createElement('a'); l.href=URL.createObjectURL(new Blob([b])); l.download=`통합정산가공_${new Date().toISOString().slice(0,10)}.xlsx`; l.click();
        } catch (e) { alert('엑셀 오류: ' + e.message); }
    }

    function renderCharts(d, m, p) {
        Object.values(charts).forEach(c => c.destroy()); const k = Object.keys(d).sort();
        const step = Math.ceil(k.length / 15); const displayLabels = k.map((x, i) => i % step === 0 ? x.substring(5) : '');
        charts.daily = new Chart(document.getElementById('dailyTrendChart'), { type:'line', data:{labels:displayLabels, datasets:[{label:'매출',data:k.map(x=>d[x]),borderColor:'#4e73df',backgroundColor:'rgba(78,115,223,0.1)',fill:true,tension:0.4,pointRadius:k.length>31?2:4}]}, options:{maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{callback:v=>v.toLocaleString()+'원'}}}}});
        charts.method = new Chart(document.getElementById('paymentMethodChart'), { type:'doughnut', data:{labels:Object.keys(m), datasets:[{data:Object.values(m),backgroundColor:['#4e73df','#1cc88a','#36b9cc','#f6c23e','#e74a3b']}]}, options:{maintainAspectRatio:false}});
        const pd = Object.entries(p).sort((a,b)=>b[1].amt-a[1].amt);
        charts.product = new Chart(document.getElementById('topProductsChart'), { type:'bar', data:{labels:pd.map(x=>x[0]), datasets:[{label:'매출액',data:pd.map(x=>x[1].amt),backgroundColor:'#4e73df',borderRadius:10}]}, options:{indexAxis:'y',maintainAspectRatio:false}});
    }

    window.onload = init;
</script>
