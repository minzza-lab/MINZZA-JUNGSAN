<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이스페이 정산 통합 가공 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --info: #36b9cc; --warning: #f6c23e; --danger: #e74a3b; --dark: #5a5c69; --light: #f8f9fc; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* 매핑 관리 패널 */
        .mapping-panel { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 30px; border-top: 5px solid var(--primary); }
        .mapping-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .mapping-table-wrapper { max-height: 350px; overflow-y: auto; border: 1px solid #e3e6f0; border-radius: 8px; }
        .mapping-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .mapping-table th { background: #f8f9fc; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #e3e6f0; color: #4e73df; }
        .mapping-table td { padding: 8px 12px; border-bottom: 1px solid #e3e6f0; }
        .mapping-table tr.unclassified { background-color: #fff1f0; }
        .mapping-table tr.unclassified td:nth-child(2) { color: var(--danger); font-weight: bold; }
        
        .input-inline { width: 100%; border: 1px solid #ddd; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 0.85rem; box-sizing: border-box; }
        .input-inline:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* 업로드 섹션 */
        .upload-area { background: white; border: 3px dashed var(--primary); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 30px; }
        .upload-area:hover { background-color: #f1f4ff; transform: translateY(-2px); }
        
        /* 통계 및 차트 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .stat-card .value { font-size: 1.6rem; font-weight: 800; margin: 10px 0 5px; color: #2c3e50; }
        
        .summary-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .summary-table { width: 100%; border-collapse: collapse; }
        .summary-table th { background: #f8f9fc; padding: 12px; text-align: left; border-bottom: 2px solid #e3e6f0; color: #4e73df; }
        .summary-table td { padding: 12px; border-bottom: 1px solid #e3e6f0; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 30px; }
        .chart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 400px; }
        .chart-title { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; }
        .chart-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: var(--primary); margin-right: 10px; border-radius: 2px; }
        
        .hidden { display: none; }
        #fileInput { display: none; }
        .btn-main { background: linear-gradient(135deg, #1cc88a 0%, #13855c 100%); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: all 0.3s; box-shadow: 0 4px 10px rgba(28, 200, 138, 0.3); }
        .btn-small { background: #f8f9fc; border: 1px solid #ddd; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 2rem; color: #2c3e50;">📊 정산 자동 가공 시스템</h1>
            <p style="margin:5px 0 0; color: #7f8c8d;">능동형 매핑 관리 및 대시보드</p>
        </div>
        <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: 600; padding: 8px 16px; border: 1px solid #ccc; border-radius: 20px;">← 홈으로</a>
    </header>

    <!-- 매핑 관리 패널 -->
    <div class="mapping-panel">
        <div class="mapping-header">
            <h2 style="margin:0; font-size: 1.2rem; color: #2c3e50;">⚙️ 상품 매핑 관리 (수정 시 실시간 반영)</h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-small" onclick="resetMapping()" style="color: var(--danger);">🗑️ 초기화</button>
            </div>
        </div>
        
        <div class="mapping-table-wrapper">
            <table class="mapping-table">
                <thead>
                    <tr>
                        <th>검색 키워드</th>
                        <th>최종 분류 결과 (입력 시 즉시 반영)</th>
                        <th style="width: 50px; text-align: center;">삭제</th>
                    </tr>
                </thead>
                <tbody id="mappingTableBody"></tbody>
            </table>
        </div>
        
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <input type="text" id="newKeyword" class="input-inline" style="flex: 2;" placeholder="새 키워드 추가...">
            <input type="text" id="newResult" class="input-inline" style="flex: 1;" placeholder="결과(카테고리)...">
            <button class="btn-small" style="background: var(--primary); color: white; border: none; padding: 0 20px;" onclick="addMappingRule()">추가</button>
        </div>
    </div>

    <!-- 파일 업로드 영역 -->
    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size: 3rem;">📥</div>
        <h3>정산 로우데이터 파일을 이곳에 끌어다 놓으세요</h3>
        <p>파일 업로드 시 미분류 상품은 상단 패널에 자동으로 표시됩니다.</p>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
    </div>

    <!-- 대시보드 콘텐츠 -->
    <div id="dashboardContent" class="hidden">
        <div style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="reportTitle" style="margin:0; color: #2c3e50;">📋 분석 리포트</h2>
            <button onclick="exportToProcessedFormat()" class="btn-main">📥 가공 양식 자동 변환 (.xlsx)</button>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="summary-container">
            <div class="chart-title">상품 분류별 실적 요약</div>
            <div id="summaryTableContainer"></div>
        </div>
        <div class="charts-grid">
            <div class="chart-container"><div class="chart-title">일자별 매출 추이</div><canvas id="dailyTrendChart"></canvas></div>
            <div class="chart-container"><div class="chart-title">결제 수단별 비중</div><canvas id="paymentMethodChart"></canvas></div>
            <div class="chart-container" style="grid-column: span 2;"><div class="chart-title">상품 분류별 매출 비중</div><canvas id="topProductsChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    let MASTER_MAPPING = [];
    let charts = {};
    let currentRawData = null;

    function init() {
        const saved = localStorage.getItem('shinan_mapping_master_v2');
        if (saved) {
            MASTER_MAPPING = JSON.parse(saved);
        } else {
            MASTER_MAPPING = [
                { keyword: '밀리터리', result: '밀리터리' }, { keyword: '시즌권', result: '스키시즌권' },
                { keyword: '원데이락커', result: '장비보관소' }, { keyword: '리프트', result: '리프트' },
                { keyword: '강습pkg', result: '강습pkg' }, { keyword: '눈썰매', result: '눈썰매' }
            ];
            saveMapping();
        }
        renderMappingTable();
    }

    function renderMappingTable() {
        const tbody = document.getElementById('mappingTableBody');
        tbody.innerHTML = MASTER_MAPPING.map((m, i) => `
            <tr class="${m.result === '미분류' ? 'unclassified' : ''}">
                <td>${m.keyword}</td>
                <td><input type="text" class="input-inline" value="${m.result}" onchange="updateMappingResult(${i}, this.value)" placeholder="카테고리 지정..."></td>
                <td style="text-align: center;"><button class="btn-delete" onclick="deleteMappingRule(${i})" style="color:red; background:none; border:none; cursor:pointer;">&times;</button></td>
            </tr>
        `).join('');
    }

    function updateMappingResult(index, newValue) {
        MASTER_MAPPING[index].result = newValue.trim() || '미분류';
        saveMapping();
        renderMappingTable();
        if (currentRawData) processData(currentRawData); // 수정 즉시 대시보드 리로드
    }

    function addMappingRule() {
        const kw = document.getElementById('newKeyword').value.trim();
        const rs = document.getElementById('newResult').value.trim() || '미분류';
        if (!kw) return alert('키워드를 입력해주세요.');
        MASTER_MAPPING.unshift({ keyword: kw, result: rs });
        document.getElementById('newKeyword').value = '';
        document.getElementById('newResult').value = '';
        saveMapping();
        renderMappingTable();
        if (currentRawData) processData(currentRawData);
    }

    function deleteMappingRule(index) {
        if (confirm('이 규칙을 삭제하시겠습니까?')) {
            MASTER_MAPPING.splice(index, 1);
            saveMapping();
            renderMappingTable();
            if (currentRawData) processData(currentRawData);
        }
    }

    function saveMapping() { localStorage.setItem('shinan_mapping_master_v2', JSON.stringify(MASTER_MAPPING)); }
    function resetMapping() { if (confirm('초기화하시겠습니까?')) { localStorage.removeItem('shinan_mapping_master_v2'); location.reload(); } }

    // 파일 업로드 처리
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--success)'; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = 'var(--primary)'; };
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => { if(e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array', cellDates: true });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
            
            // 미분류 자동 탐지 및 매핑 목록에 추가
            detectNewProducts(jsonData);
            
            currentRawData = jsonData;
            processData(jsonData);
        };
        reader.readAsArrayBuffer(file);
    }

    function detectNewProducts(data) {
        const filtered = data.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
        let addedCount = 0;
        
        filtered.forEach(row => {
            const pName = getVal(row, ['상품명']) || '';
            if (pName === '') return;
            
            let isMapped = false;
            for (const m of MASTER_MAPPING) { if (pName.includes(m.keyword)) { isMapped = true; break; } }
            
            if (!isMapped) {
                MASTER_MAPPING.unshift({ keyword: pName, result: '미분류' });
                addedCount++;
            }
        });
        
        if (addedCount > 0) {
            saveMapping();
            renderMappingTable();
            alert(`${addedCount}개의 새로운 미분류 상품이 매핑 패널에 추가되었습니다. 카테고리를 지정해 주세요.`);
        }
    }

    function parseMoney(val) { return !val ? 0 : (typeof val === 'number' ? val : parseInt(val.toString().replace(/[^0-9-]/g, '')) || 0); }
    function getVal(row, names) { 
        for (let n of names) { 
            if (row[n] !== undefined && row[n] !== null && row[n] !== "") return row[n]; 
            let target = n.replace(/\s+/g, '').toLowerCase();
            for (let k in row) { if (k.toString().replace(/\s+/g, '').toLowerCase().includes(target)) return row[k]; }
        }
        return ''; 
    }

    function processData(data) {
        const filtered = data.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
        let totalGross = 0, totalNet = 0, totalFee = 0, cancelCount = 0, cancelAmt = 0;
        const dailyData = {}, payMethodData = {}, productData = {};

        filtered.forEach(r => {
            const amt = parseMoney(getVal(r, ['거래금액', '결제금액']));
            const net = parseMoney(getVal(r, ['정산금액', '지급금액']));
            const fee = parseMoney(getVal(r, ['결제수수료', '수수료', '수수료합계'])) + parseMoney(getVal(r, ['VAT', '부가세']));
            const method = getVal(r, ['결제 서비스명', '결제수단']) || '기타';
            const pName = getVal(r, ['상품명']) || '미지정';
            const dateVal = getVal(r, ['정산일', '거래일자']);
            
            let dateKey = '기타';
            const m = dateVal.toString().match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/);
            if (m) dateKey = `${m[1]}-${m[2]}-${m[3]}`;

            totalGross += amt; totalNet += net; totalFee += fee;
            if (amt < 0) { cancelCount++; cancelAmt += Math.abs(amt); }
            dailyData[dateKey] = (dailyData[dateKey] || 0) + amt;
            payMethodData[method] = (payMethodData[method] || 0) + amt;
            
            let mappedCat = '미분류';
            for (let item of MASTER_MAPPING) { if (pName.includes(item.keyword)) { mappedCat = item.result; break; } }
            if (!productData[mappedCat]) productData[mappedCat] = { count: 0, amt: 0 };
            productData[mappedCat].count++;
            productData[mappedCat].amt += amt;
        });

        const feeRate = totalGross ? ((totalFee / totalGross) * 100).toFixed(2) : 0;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>총 거래 금액</h3><div class="value">${totalGross.toLocaleString()}원</div></div>
            <div class="stat-card" style="border-left-color: var(--success)"><h3>순 정산 예정액</h3><div class="value">${totalNet.toLocaleString()}원</div></div>
            <div class="stat-card" style="border-left-color: var(--warning)"><h3>실질 수수료 (VAT포함)</h3><div class="value">${totalFee.toLocaleString()}원 (${feeRate}%)</div></div>
            <div class="stat-card" style="border-left-color: var(--danger)"><h3>취소 발생</h3><div class="value">${cancelAmt.toLocaleString()}원</div><div class="sub-text">${cancelCount}건</div></div>
        `;

        let tableHtml = `<table class="summary-table"><thead><tr><th>상품 분류</th><th>결제 건수</th><th>거래 금액</th><th>매출 비중</th></tr></thead><tbody>`;
        Object.entries(productData).sort((a, b) => b[1].amt - a[1].amt).forEach(([cat, d]) => {
            tableHtml += `<tr><td><strong>${cat}</strong></td><td>${d.count.toLocaleString()}건</td><td>${d.amt.toLocaleString()}원</td><td>${((d.amt/totalGross)*100).toFixed(1)}%</td></tr>`;
        });
        document.getElementById('summaryTableContainer').innerHTML = tableHtml + `</tbody></table>`;

        renderCharts(dailyData, payMethodData, productData);
        document.getElementById('dashboardContent').classList.remove('hidden');
        document.getElementById('reportTitle').innerText = `📋 분석 리포트 (${Object.keys(dailyData)[0]} ~ ${Object.keys(dailyData).pop()})`;
    }

    async function exportToProcessedFormat() {
        try {
            const workbook = new ExcelJS.Workbook();
            const rawFiltered = currentRawData.filter(r => ['shinanrs1m', 'shinanrs4m', 'shinanrs5m'].includes(getVal(r, ['MID']).toString()));
            
            // 1. [매핑데이터] 시트
            const mapSheet = workbook.addWorksheet('매핑데이터');
            mapSheet.addRow(['검색 키워드', '최종 분류 결과']);
            MASTER_MAPPING.forEach(m => mapSheet.addRow([m.keyword, m.result]));

            // 2. 날짜별 시트 생성 로직 (기존과 동일하되 최신 MASTER_MAPPING 참조)
            const grouped = {};
            rawFiltered.forEach(row => {
                const d = getVal(row, ['정산일', '거래일자']).toString();
                const m = d.match(/(\d{4})[-.\/]?(0[1-9]|1[0-2])[-.\/]?(0[1-9]|[12][0-9]|3[01])/);
                const day = m ? `${m[2]}월${m[3]}일` : '기타';
                if (!grouped[day]) grouped[day] = [];
                grouped[day].push(row);
            });

            for (const [date, rows] of Object.entries(grouped).sort()) {
                const sheet = workbook.addWorksheet(date);
                sheet.addRow(['NO.', '결제 서비스명', '정산일', '거래금액', '수수료+VAT', '정산금액', '상품명', '변환결과(X)']);
                rows.forEach((r, i) => {
                    const pName = getVal(r, ['상품명']) || '';
                    let m = '미분류';
                    for (let item of MASTER_MAPPING) { if (pName.includes(item.keyword)) { m = item.result; break; } }
                    sheet.addRow([i+1, getVal(r, ['결제 서비스명']), getVal(r, ['정산일']), parseMoney(getVal(r, ['거래금액'])), parseMoney(getVal(r, ['수수료']))+parseMoney(getVal(r, ['VAT'])), parseMoney(getVal(r, ['정산금액'])), pName, m]);
                });
            }

            const buf = await workbook.xlsx.writeBuffer();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([buf]));
            link.download = `나이스페이_가공정산_${new Date().toISOString().slice(0,10)}.xlsx`;
            link.click();
        } catch(e) { alert(e.message); }
    }

    function renderCharts(daily, methods, products) {
        Object.values(charts).forEach(c => c.destroy());
        const dCtx = document.getElementById('dailyTrendChart');
        charts.daily = new Chart(dCtx, { type: 'line', data: { labels: Object.keys(daily).sort().map(d => d.substring(5)), datasets: [{ label: '매출', data: Object.keys(daily).sort().map(k => daily[k]), borderColor: '#4e73df', tension: 0.3 }] }, options: { maintainAspectRatio: false } });
        const mCtx = document.getElementById('paymentMethodChart');
        charts.method = new Chart(mCtx, { type: 'doughnut', data: { labels: Object.keys(methods), datasets: [{ data: Object.values(methods), backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b'] }] }, options: { maintainAspectRatio: false } });
        const pCtx = document.getElementById('topProductsChart');
        const pData = Object.entries(products).sort((a,b) => b[1].amt - a[1].amt);
        charts.product = new Chart(pCtx, { type: 'bar', data: { labels: pData.map(e => e[0]), datasets: [{ label: '매출액', data: pData.map(e => e[1].amt), backgroundColor: '#4e73df' }] }, options: { indexAxis: 'y', maintainAspectRatio: false } });
    }

    window.onload = init;
</script>
</body>
</html>
